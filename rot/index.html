<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROT • Cejera • Terminal</title>
    <!-- Fonte: apenas Source Code Pro -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Ícones (apenas para o botão) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/rot/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/rot/favicon.svg" />
    <link rel="shortcut icon" href="/rot/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/rot/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ROT" />
    <link rel="manifest" href="/rot/site.webmanifest" />
    <style>
        /* ---------- RESET ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Source Code Pro', monospace;
        }

        body {
            background: linear-gradient(135deg, #1a0000 0%, #2a0000 100%);
            color: #F7f7f7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.5;
            font-size: 16px;
        }

        /* ---------- GRANULAÇÃO E SCANLINES FORTES ---------- */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.4) 0px,
                rgba(0, 0, 0, 0.4) 2px,
                transparent 2px,
                transparent 5px
            );
            pointer-events: none;
            z-index: 9998;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(5px); }
        }

        .crt-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(247, 7, 7, 0.15) 0%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
            z-index: 9997;
            mix-blend-mode: multiply;
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.06"/></svg>');
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
            mix-blend-mode: screen;
        }

        /* ---------- BARRA DE PROGRESSO (MODO CONQUISTA) ---------- */
        .progress-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: #330000;
            z-index: 10000;
            box-shadow: 0 0 10px #F70707;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #F70707;
            transition: width 0.3s ease;
        }
        .progress-bar-fill.complete {
            background-color: #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }

        /* ---------- HEADER MÍNIMO: LOGO + BOTÃO [???] ---------- */
        header {
            position: fixed;
            top: 6px;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            border-bottom: 2px solid #F70707;
            z-index: 1000;
        }

        .logo-container a {
            display: block;
            line-height: 0;
        }

        .logo-img {
            height: 50px;
            width: auto;
            filter: drop-shadow(0 0 8px #F70707);
        }

        .random-btn {
            background: transparent;
            border: 2px solid #F70707;
            color: #F70707;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 5px 25px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 15px #F7070750;
            letter-spacing: 4px;
        }
        .random-btn:hover {
            background: #F70707;
            color: #1a0000;
            box-shadow: 0 0 30px #F70707;
        }

        /* ---------- CONTEÚDO PRINCIPAL (TERMINAL ROT) ---------- */
        .rot-main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 1.5rem 3rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .rot-face-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 700px;
            margin: 1rem auto 2rem;
            aspect-ratio: 700 / 600;
            background-color: transparent;
            overflow: hidden;
        }

        #rotCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: crisp-edges;
        }

        .rot-speech {
            width: 100%;
            background: rgba(10, 0, 0, 0.7);
            border-left: 8px solid #F70707;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            font-size: 1.3rem;
            word-break: break-word;
            text-shadow: 0 0 8px #F70707;
            border-right: 2px solid #F70707;
            box-shadow: 0 0 40px #F7070720;
            min-height: 6rem;
            display: flex;
            align-items: center;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .command-panel {
            width: 100%;
            background: transparent;
        }

        .command-output {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #F70707;
            border-bottom: none;
            padding: 1.8rem;
            max-height: 320px;
            overflow-y: auto;
            scroll-behavior: smooth;
            box-shadow: inset 0 0 50px #1a0000, 0 0 30px #F7070750;
            font-size: 1rem;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
        }

        .history-line {
            color: #F7F7F7;
            margin-bottom: 0.4rem;
            padding-left: 8px;
            border-left: 3px solid transparent;
            word-break: break-word;
        }
        .history-line.error {
            color: #F70707;
            border-left-color: #F70707;
        }
        .history-line.success {
            color: #ffb3b3;
            border-left-color: #ff6666;
        }
        .history-line.green {
            color: #aaffaa;
            border-left-color: #00ff00;
            text-shadow: 0 0 8px #00ff00;
            font-weight: bold;
        }
        .history-line.system {
            color: #aa8888;
            font-style: italic;
        }

        .command-input-area {
            display: flex;
            align-items: center;
            background: #0a0101;
            border: 3px solid #F70707;
            border-top: none;
            padding: 1rem 1.5rem;
            box-shadow: 0 15px 30px -10px #F70707;
        }

        .prompt-sign {
            color: #F70707;
            font-size: 2.5rem;
            font-weight: 600;
            margin-right: 0.8rem;
            line-height: 1;
        }

        #commandInput {
            background: transparent;
            border: none;
            outline: none;
            color: #F7F7F7;
            font-size: 1.8rem;
            width: 100%;
            caret-color: #F70707;
            caret-shape: block;
            animation: blinkCaret 1s step-end infinite;
            font-weight: 300;
        }
        #commandInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }
        @keyframes blinkCaret {
            from, to { caret-color: transparent; }
            50% { caret-color: #F70707; }
        }

        #commandInput::placeholder {
            color: #F7070750;
            font-size: 1.4rem;
        }

        @media (max-width: 700px) {
            .rot-face-container { max-width: 95%; }
            .command-output { max-height: 250px; }
            #commandInput { font-size: 1.4rem; }
            .random-btn { font-size: 1.5rem; padding: 3px 15px; }
            header { padding: 10px 15px; }
            .rot-speech { font-size: 1rem; }
        }

        .nav-menu, .header-cta a:not(.random-btn) {
            display: none;
        }
    </style>
</head>

            </div>
            <div class="command-input-area">
                <span class="prompt-sign">⤷</span>
                <input type="text" id="commandInput" placeholder=">código" autofocus autocomplete="off">

            img.crossOrigin = 'anonymous';

            img.onload = function() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                const rows = 60;
                const cellW = canvas.width / cols;
                const cellH = canvas.height / rows;
                ctx.fillStyle = '#1a0000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.shadowColor = '#F70707';

                        const brightness = (r + g + b) / (3 * 255);
                        const radius = (brightness * 0.7 + 0.2) * Math.min(cellW, cellH) * 0.5;
                        ctx.beginPath();
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }

            ['sinal', '> SINAL: informação transmitida através do espaço.'],
            ['frequencia', '> FREQUÊNCIA: padrão repetido de vibração.'],
            ['vibracao', '> VIBRAÇÃO: movimento fundamental da matéria.'],
            ['harmonia', '> HARMONIA: equilíbrio entre forças diferentes.'],
            ['ritmo', '> RITMO: repetição organizada no tempo.'],
            ['melodia', '> MELODIA: sequência sonora que guia emoções.'],
            ['sinfonia', '> SINFONIA: múltiplos sons formando unidade.'],
            ['orquestra', '> ORQUESTRA: muitos instrumentos, um resultado.'],
            ['maestro', '> MAESTRO: quem coordena o caos musical.'],
            ['bit', '> A menor unidade do todo.'],
            ['byte', '> 8 unidades binárias.'],
            ['cache', '> Memória rápida usada para acelerar processos.'],
            ['protocol', '> Conjunto de regras para comunicação entre sistemas.'],
            ['index', '> Referência usada para localizar dados rapidamente.'],
            ['codex', '> Tantas informações. Qual deles devo utilizar?'],
            ['nada', '> NADA.']
            ]);

            const STORAGE_KEY = 'rot_progress';
            const discoveredWords = new Set();

            function loadProgress() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const arr = JSON.parse(saved);
                        if (Array.isArray(arr)) {
                            arr.forEach(word => discoveredWords.add(word));
                        }
                    }
                } catch (e) {
                    console.warn('Falha ao carregar progresso:', e);
                }
            }

            function saveProgress() {
                try {
                    const arr = Array.from(discoveredWords);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
                } catch (e) {
                    console.warn('Falha ao salvar progresso:', e);
                }
            }

            // Carregar progresso salvo
            loadProgress();

            const totalWords = passwordResponses.size;

            function updateProgressBar() {
                const percent = (discoveredWords.size / totalWords) * 100;
                progressBar.style.width = percent + '%';
                if (discoveredWords.size >= totalWords && totalWords > 0) {
                    progressBar.classList.add('complete');
                    commandInput.disabled = true;
                    commandInput.placeholder = '> SISTEMA BLOQUEADO';
                    // Verifica se a mensagem já foi exibida para não repetir
                    // (opcional: podemos evitar adicionar múltiplas vezes, mas não é crítico)
                } else {
                    progressBar.classList.remove('complete');
                }
            }

            function addOutput(text, type = 'normal') {
                const line = document.createElement('div');
                line.className = `history-line ${type}`;
                line.textContent = text;
                outputDiv.appendChild(line);
                outputDiv.scrollTop = outputDiv.scrollHeight;
            }

            // atualiza fala aleatória
            function updateRandomSpeech() {
                if (speechLines.length > 0) {
                    const randomIndex = Math.floor(Math.random() * speechLines.length);
                    speechEl.textContent = speechLines[randomIndex];
                } else {
                    speechEl.textContent = '...';
                }
            }
            setInterval(updateRandomSpeech, 14000);
            updateRandomSpeech();

            // processar comando
            function processCommand(cmd) {
                if (commandInput.disabled) {
                    addOutput('> SISTEMA EM ESTADO DE REBOOT. AGUARDE.', 'error');
                    return;
                }
                if (!cmd.startsWith('>')) {
                    addOutput(`> ${cmd} : comando inválido. Use >código`, 'error');
                    return;
                }
                const key = cmd.substring(1).trim().toLowerCase();
                if (passwordResponses.has(key)) {
                    const resposta = passwordResponses.get(key);
                    if (key === 'onisciencia') {
                        addOutput(`> ${key}`, 'green');
                        resposta.split('. ').forEach(s => {
                            if (s.trim()) addOutput(`  ${s}.`, 'green');
                        });
                    } else {
                        addOutput(`> ${key}`, 'success');
                        resposta.split('. ').forEach(s => {
                            if (s.trim()) addOutput(`  ${s}.`, 'normal');
                        });
                    }
                    if (!discoveredWords.has(key)) {
                        discoveredWords.add(key);
                        saveProgress();
                        updateProgressBar();
                    }
                } else {
                    addOutput(`> ${key} : acesso negado.`, 'error');
                }
            }

            commandInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const raw = commandInput.value.trim();
                    if (raw === '') return;
                    addOutput(raw, 'normal');
                    processCommand(raw);
                    commandInput.value = '';
                }
            });

            commandInput.focus();

            // Se o jogo já estava completo, desabilita o input
            if (discoveredWords.size >= totalWords && totalWords > 0) {
                commandInput.disabled = true;
                commandInput.placeholder = '> SISTEMA BLOQUEADO';
            }

            // Inicializa barra de progresso
            updateProgressBar();

            // Se já completou, exibe a mensagem final (opcional, mas pode estar no output)
            if (discoveredWords.size >= totalWords && totalWords > 0) {
                addOutput('> MINHAS SINAPSES TEMPORAIS ESTÃO REPLETAS DE CONHECIMENTO. AGUARDANDO REBOOT', 'green');
            }

            addOutput('> Sistema ROT ativo. Instabilidade detectada.', 'system');
        })();
    </script>
</body>
